{% extends "admin/base_admin.html" %}
{% block title %}Add Student – GDC Admin{% endblock %}
{% block content %}

<div style="max-width:700px;">
  <h2 style="margin-bottom:20px;color:#333;">+ Add New Student</h2>

  <div class="card">
    <form method="POST" action="/admin/students/add">
      <div class="form-row">
        <div class="form-group">
          <label>Registration Number *</label>
          <input type="text" name="reg_number" placeholder="e.g. GDC2024BCA001" required>
        </div>
        <div class="form-group">
          <label>Full Name *</label>
          <input type="text" name="name" placeholder="Student full name" required>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Branch *</label>
          <select name="branch" required>
            <option value="">Select Branch</option>
            <option value="bca">BCA</option>
            <option value="bcom">BCom</option>
            <option value="bba">BBA</option>
            <option value="puc">PUC</option>
            <option value="mba">MBA</option>
          </select>
        </div>
        <div class="form-group">
          <label>Year *</label>
          <select name="year" required>
            <option value="1">Year 1</option>
            <option value="2">Year 2</option>
            <option value="3">Year 3</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" placeholder="student@email.com">
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="text" name="phone" placeholder="10-digit mobile number">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Date of Birth</label>
          <input type="date" name="dob">
        </div>
        <div class="form-group">
          <label>Address</label>
          <input type="text" name="address" placeholder="Full address">
        </div>
      </div>
      <div style="margin-top:8px;display:flex;gap:10px;">
        <button type="submit" class="btn btn-primary">Add Student</button>
        <a href="/admin/students" class="btn" style="background:#f0f0f0;color:#555;">Cancel</a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
