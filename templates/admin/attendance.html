{% extends "admin/base_admin.html" %}
{% block title %}Manage Attendance{% endblock %}
{% block content %}
<div class="card-header"><h2 class="card-title">Manage Attendance</h2></div>
<div class="card">
  <form action="{{ url_for('admin.admin_attendance') }}" method="POST">
    <div style="display:flex;gap:15px;flex-wrap:wrap;">
      <div class="form-group"><label>Student</label>
        <select name="student_id" class="form-control" required>
          {% for s in students %}<option value="{{ s.id }}">{{ s.name }} ({{ s.reg_number }}) - {{ s.branch|upper }}</option>{% endfor %}
        </select>
      </div>
      <div class="form-group"><label>Semester</label><input type="number" name="semester" class="form-control" required></div>
      <div class="form-group"><label>Subject</label><input type="text" name="subject" class="form-control" required></div>
      <div class="form-group"><label>Total Classes</label><input type="number" name="total_classes" class="form-control" required></div>
      <div class="form-group"><label>Classes Attended</label><input type="number" name="attended" class="form-control" required></div>
      <div class="form-group" style="width:100%;"><button type="submit" class="btn btn-primary">Add Attendance</button></div>
    </div>
  </form>
</div>
{% endblock %}
