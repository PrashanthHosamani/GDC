{% extends "admin/base_admin.html" %}
{% block title %}Manage Fees{% endblock %}
{% block content %}
<div class="card-header">
  <h2 class="card-title">Manage Fees</h2>
</div>
<div class="card">
  <form action="{{ url_for('admin.admin_fees') }}" method="POST">
    <div style="display:flex;gap:15px;flex-wrap:wrap;">
      <div class="form-group" style="flex:1;"><label>Branch</label>
        <select name="branch" class="form-control" required>
          <optgroup label="Regular Admission">
            <option value="bca">BCA</option>
            <option value="bcom">BCOM</option>
            <option value="bba">BBA</option>
            <option value="puc">PUC</option>
            <option value="mba">MBA</option>
          </optgroup>
          <optgroup label="Merit Based">
            <option value="bca(m)">BCA(M)</option>
            <option value="bcom(m)">BCOM(M)</option>
            <option value="bba(m)">BBA(M)</option>
            <option value="mba(m)">MBA(M)</option>
          </optgroup>
        </select>
      </div>
      <div class="form-group"><label>Year</label><input type="number" name="year" class="form-control" required></div>
      <div class="form-group"><label>Amount (₹)</label><input type="number" step="0.01" name="amount" class="form-control" required></div>
      <div class="form-group">
        <label>Due Date</label>
        <input type="date" name="due_date" id="due_date" class="form-control">
        <script>
          document.getElementById('due_date').min = new Date().toISOString().split('T')[0];
        </script>
      </div>
      <div class="form-group" style="width:100%;"><label>Description</label><input type="text" name="description" class="form-control"></div>
      <div class="form-group"><button type="submit" class="btn btn-primary">Add Fee Record</button></div>
    </div>
  </form>
</div>
<div class="card">
  <table>
    <tr><th>Branch & Year</th><th>Amount</th><th>Description</th><th>Due Date</th><th>Action</th></tr>
    {% for f in fees %}
    <tr>
      <td><span class="badge badge-blue">{{ f.branch | upper }}</span> Yr {{ f.year }}</td>
      <td>₹{{ f.amount }}</td>
      <td>{{ f.description }}</td>
      <td>{{ f.due_date }}</td>
      <td>
        <form action="{{ url_for('admin.admin_delete_fee', fid=f.id) }}" method="POST"><button type="submit" class="btn btn-danger btn-sm">Delete</button></form>
      </td>
    </tr>
    {% endfor %}
  </table>
</div>
{% endblock %}
