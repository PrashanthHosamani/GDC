{% extends "admin/base_admin.html" %}
{% block title %}Manage Results{% endblock %}
{% block content %}
<div class="card-header"><h2 class="card-title">Manage Results</h2></div>
<div class="card">
  <form action="{{ url_for('admin.admin_results') }}" method="POST">
    <div style="display:flex;gap:15px;flex-wrap:wrap;">
      <div class="form-group"><label>Student</label>
        <select name="student_id" class="form-control" required>
          {% for s in students %}<option value="{{ s.id }}">{{ s.name }} ({{ s.reg_number }}) - {{ s.branch|upper }}</option>{% endfor %}
        </select>
      </div>
      <div class="form-group"><label>Semester</label><input type="number" name="semester" class="form-control" required></div>
      <div class="form-group"><label>Subject</label><input type="text" name="subject" class="form-control" required></div>
      <div class="form-group"><label>Marks Obtained</label><input type="number" step="0.1" name="marks" class="form-control" required></div>
      <div class="form-group"><label>Max Marks</label><input type="number" step="0.1" name="max_marks" value="100" class="form-control" required></div>
      <div class="form-group"><label>Grade</label><input type="text" name="grade" class="form-control"></div>
      <div class="form-group"><label>Year</label><input type="number" name="year" class="form-control" required></div>
      <div class="form-group" style="width:100%;"><button type="submit" class="btn btn-primary">Add Result</button></div>
    </div>
  </form>
</div>
{% endblock %}
