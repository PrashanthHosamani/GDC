<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Govinda Dasa College</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family: Arial, Helvetica, sans-serif; }

body {
    height: 100vh; width: 100vw;
    background-image: url("{{ url_for('static', filename='images/college_bg.jpg') }}");
    background-size: cover; background-position: center; background-repeat: no-repeat;
    position: relative; overflow: hidden;
}
.overlay {
    position: absolute; top:0; left:0; width:100%; height:100%;
    background-color: rgba(255,255,255,0.65); z-index:1;
}
.content {
    position: relative; z-index:2; padding-top:50px;
    text-align:center; color:#000;
}
.content h1 { font-size:70px; font-weight:700; margin-bottom:10px; }
.content h2 { font-size:44px; font-weight:700; margin-bottom:10px; }
.content h3 { font-size:34px; font-weight:700; }

.login-btn {
    position:absolute; top:40px; right:50px;
    background-color:#2b4582; color:white; text-decoration:none;
    padding:12px 35px; border-radius:6px; font-size:20px;
    border:none; cursor:pointer; z-index:3;
}
.login-btn:hover { background-color:#203565; }

/* ── Chatbot Icon ── */
.chatbot-icon {
    position: fixed; bottom:25px; right:40px;
    width:90px; height:90px; z-index:100;
    cursor:pointer;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3));
    transition: transform 0.2s;
}
.chatbot-icon:hover { transform: scale(1.1); }

/* ── Chat Window ── */
.chat-window {
    display: none;
    position: fixed; bottom:130px; right:40px;
    width: 300px; height: 380px;
    background: rgba(10, 27, 45, 0.95);
    backdrop-filter: blur(12px);
    border-radius: 16px;
    border: 1px solid #00e5ff;
    box-shadow: 0 0 25px rgba(0, 229, 255, 0.4);
    z-index: 100;
    display: none;
    flex-direction: column;
    overflow: hidden;
}
.chat-header {
    background: linear-gradient(135deg, #0072ff, #00e5ff);
    padding: 12px 16px;
    font-weight: bold; font-size: 15px; color: white;
    display: flex; align-items: center; justify-content: space-between;
}
.chat-header span { font-size: 20px; margin-right: 8px; }
.close-btn { cursor:pointer; font-size:18px; color:white; background:none; border:none; }

.chat-messages {
    flex: 1; overflow-y: auto; padding: 12px;
    display: flex; flex-direction: column; gap: 10px;
    scrollbar-width: thin; scrollbar-color: #00e5ff transparent;
}
.msg { max-width:85%; padding: 9px 13px; border-radius:12px; font-size:13px; line-height:1.5; }
.msg.bot {
    background: rgba(0, 229, 255, 0.12);
    border: 1px solid rgba(0, 229, 255, 0.25);
    color: #e0f7ff; align-self: flex-start;
    border-bottom-left-radius: 2px;
}
.msg.user {
    background: #0072ff; color:white;
    align-self: flex-end;
    border-bottom-right-radius: 2px;
}

.chat-input-row {
    display: flex; gap: 8px; padding: 10px;
    border-top: 1px solid rgba(0,229,255,0.2);
}
.chat-input-row input {
    flex:1; padding: 9px 12px; border-radius: 20px;
    border: 1px solid rgba(0,229,255,0.3);
    background: rgba(255,255,255,0.08);
    color: white; font-size: 13px; outline: none;
}
.chat-input-row input::placeholder { color: rgba(255,255,255,0.4); }
.chat-input-row input:focus { border-color: #00e5ff; }
.send-btn {
    background: linear-gradient(135deg,#0072ff,#00e5ff);
    border:none; color:white; border-radius:50%;
    width:36px; height:36px; cursor:pointer; font-size:16px;
    display:flex; align-items:center; justify-content:center;
}
.send-btn:hover { opacity:0.85; }
</style>
</head>
<body>

<div class="overlay"></div>
<a href="/login" class="login-btn">Login</a>

<div class="content">
    <h1>Govinda Dasa College</h1>
    <h2>(Affiliated to Mangalore University)</h2>
    <h3>SURATHKAL-575014,D.K</h3>
</div>

<!-- Clickable Robot Icon -->
<div class="chatbot-icon" onclick="toggleChat()" title="Chat with GDC Buddy">
    <svg viewBox="0 0 100 110" xmlns="http://www.w3.org/2000/svg">
        <g stroke="#000" stroke-width="3.5" fill="none" stroke-linejoin="round" stroke-linecap="round">
            <path d="M40 25 L32 15 M68 25 L76 15" />
            <circle cx="32" cy="13" r="3" fill="#00e5ff" stroke="#0072ff"/>
            <circle cx="76" cy="13" r="3" fill="#00e5ff" stroke="#0072ff"/>
            <path d="M 23 42 Q 23 22 50 22 Q 77 22 77 42 L 77 57 Q 77 65 50 67 Q 23 65 23 57 Z" fill="#f0f4f8"/>
            <rect x="30" y="30" width="40" height="22" rx="5" fill="#0a1b2d" stroke="none"/>
            <circle cx="42" cy="41" r="5" fill="#00e5ff" stroke="none"/>
            <circle cx="58" cy="41" r="5" fill="#00e5ff" stroke="none"/>
            <path d="M 23 42 A6 6 0 0 0 16 48 A 6 6 0 0 0 23 54 Z" fill="#f0f4f8"/>
            <path d="M 77 42 A6 6 0 0 1 84 48 A 6 6 0 0 1 77 54 Z" fill="#f0f4f8"/>
            <path d="M 38 67 L 62 67 L 65 88 Q 65 96 50 96 Q 35 96 35 88 Z" fill="#f0f4f8"/>
            <path d="M 37 77 L 63 77 M 36 88 L 64 88" stroke-width="2.5"/>
            <path d="M 45 67 L 55 67 L 55 71 L 45 71 Z" fill="#0072ff" stroke="none"/>
            <path d="M 35 74 Q 20 77 23 90" stroke-width="3"/>
            <path d="M 65 74 Q 82 72 85 60" stroke-width="3"/>
            <path d="M 43 96 L 57 96 Q 59 103 50 103 Q 41 103 43 96 Z" fill="#333" stroke="none"/>
        </g>
    </svg>
</div>

<!-- Floating Chat Window -->
<div class="chat-window" id="chatWindow">
    <div class="chat-header">
        <div><span>🤖</span> GDC Buddy</div>
        <button class="close-btn" onclick="toggleChat()">✕</button>
    </div>
    <div class="chat-messages" id="chatMessages">
        <div class="msg bot">👋 Hi! I'm GDC Buddy. Ask me about admissions, fees, courses, placements, or type <b>help</b>!</div>
    </div>
    <div class="chat-input-row">
        <input id="chatInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter') sendMsg()">
        <button class="send-btn" onclick="sendMsg()">➤</button>
    </div>
</div>

<script>
var chatOpen = false;
var chatHistory = [];

function toggleChat() {
    chatOpen = !chatOpen;
    var win = document.getElementById('chatWindow');
    win.style.display = chatOpen ? 'flex' : 'none';
    if (chatOpen) document.getElementById('chatInput').focus();
}

function sendMsg() {
    var input = document.getElementById('chatInput');
    var text = input.value.trim();
    if (!text) return;

    addMsg(text, 'user');
    input.value = '';

    // Create an empty bot message box
    var box = document.getElementById('chatMessages');
    var botDiv = document.createElement('div');
    botDiv.className = 'msg bot';
    botDiv.innerHTML = '<span class="typing-indicator dots">...</span>';
    box.appendChild(botDiv);
    box.scrollTop = box.scrollHeight;

    var requestPayload = {
        message: text,
        history: chatHistory
    };
    chatHistory.push({role: 'user', content: text});

    fetch('/chatbot/api', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify(requestPayload)
    })
    .then(async response => {
        const reader = response.body.getReader();
        const decoder = new TextDecoder("utf-8");
        let fullReply = "";
        let isFirstChunk = true;

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            
            const chunk = decoder.decode(value, {stream: true});
            const lines = chunk.split('\n');
            
            for (let line of lines) {
                if (line.startsWith('data: ')) {
                    const dataText = line.substring(6);
                    if (dataText === '[DONE]') continue;
                    
                    if (isFirstChunk) {
                        botDiv.innerHTML = '';
                        isFirstChunk = false;
                    }
                    
                    fullReply += dataText;
                    botDiv.innerHTML = fullReply.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
                    box.scrollTop = box.scrollHeight;
                }
            }
        }
        chatHistory.push({role: 'assistant', content: fullReply});
    })
    .catch(err => {
        botDiv.innerHTML = "Sorry, an error occurred while connecting to the server.";
    });
}

function addMsg(text, type) {
    var box = document.getElementById('chatMessages');
    var div = document.createElement('div');
    div.className = 'msg ' + type;
    div.innerHTML = text; // since we use <br> and bold formatting
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}
</script>

</body>
</html>
