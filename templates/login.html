<!DOCTYPE html>
<html>
<head>
    <title>Govinda Dasa College Login</title>
<style>
body{
margin:0;
font-family:'Segoe UI', sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: linear-gradient(135deg,#666cb4,#0a1b2d);
}

.box{
background:rgba(255,255,255,0.15);
backdrop-filter: blur(10px);
padding: 30px;
width: 290px;
box-shadow:0 0 20px #00e5ff;
text-align:center;
border-radius: 15px;
}
.box:hover
{
    transform: scale(1.05);
    box-shadow: 0 10px 25px;
}

input:focus
{
    outline: none;
    box-shadow: 0 0 10px #00e5ff;
}
input{
margin:10px 0;
padding:10px;
width:100%;
border-radius: 8px;
border: none;
outline: none;
font-size: 14px;
box-sizing: border-box;
}

button{
background:linear-gradient(45deg,#00c6ff,#0072ff);
color:white;
border:none;
padding:10px 25px;
border-radius:8px;
cursor:pointer;
font-size:15px;
transition:0.3s;
margin-top: 10px;
}

button:hover
{
    background: #0072ff;
    transform:scale(1.05);
}
.role{
    margin:15px 0;
    display:flex;
    justify-content:center;
    gap:15px;
    margin-bottom: 20px;
}

.role label{
    font-size: 14px;
    color: white;
    cursor: pointer;
}

h2 {
    color: white;
    margin-top: 0;
}

#msg {
    color: #ff4d4d;
    margin-top: 15px;
    font-weight: bold;
    font-size: 14px;
}
.links {
    margin-top: 15px;
    font-size: 13px;
}
.links a {
    color: #00e5ff;
    text-decoration: none;
}
.links a:hover { color: white; }
</style>
</head>
<body>

<div class="box">
    <h2>GDC Login</h2>
    
    <form method="POST" action="/login">
        <div class="role">
            <label><input type="radio" name="role" value="student" checked>STUDENT</label>
            <label><input type="radio" name="role" value="admin">ADMIN</label> 
            <label><input type="radio" name="role" value="fresher">FRESHER</label>
        </div>
        
        <input name="username" id="user" placeholder="Username" required>
        <input name="password" id="pass" type="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
    
    <p id="msg">{% if error %}{{ error }}{% endif %}</p>
    <div class="links"><a href="/register">New Student? Register Here</a></div>
    <div class="links"><a href="/">← Back to Home</a></div>
</div>

</body>
</html>
